    <radialGradient id="sclera-dark-right" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(316 84) rotate(90) scale(56 56)">
      <stop offset="0.1" stop-color="#23313D"/>
      <stop offset="0.55" stop-color="#121A22"/>
      <stop offset="1" stop-color="#06090E"/>
    </radialGradient>
    <radialGradient id="iris-left" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(104 88) rotate(90) scale(36 36)">
      <stop offset="0.05" stop-color="#556D83"/>
      <stop offset="0.32" stop-color="#243448"/>
      <stop offset="0.68" stop-color="#111A25"/>
      <stop offset="1" stop-color="#030507"/>
